<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="sky-o" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(130,210,240,0.90)"/>
      <stop offset="100%" stop-color="rgba(200,240,255,0.70)"/>
    </linearGradient>
    <linearGradient id="beam-o" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="8%"   stop-color="#3a8ab0"/>
      <stop offset="40%"  stop-color="#2e7aa0"/>
      <stop offset="70%"  stop-color="#1e6080"/>
      <stop offset="92%"  stop-color="#0e4060"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.22)"/>
    </linearGradient>
    <linearGradient id="fab-o" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(40,100,160,0.94)"/>
      <stop offset="100%" stop-color="rgba(20,70,120,0.94)"/>
    </linearGradient>
    <pattern id="fab-fold-o" width="1" height="12" patternUnits="userSpaceOnUse">
      <rect width="1" height="12" fill="transparent"/>
      <line x1="0" y1="11" x2="1" y2="11" stroke="rgba(10,60,100,0.20)" stroke-width="200"/>
    </pattern>
    <filter id="beam-shadow-o">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>

  <!-- Frame -->
  <rect x="0" y="0" width="200" height="260" rx="6" ry="6" fill="#2e6e8e"/>

  <!-- Glass / sky above top beam -->
  <rect x="6" y="6" width="188" height="74" fill="url(#sky-o)"/>

  <!-- Top beam -->
  <rect x="6" y="77" width="188" height="16" rx="3" fill="url(#beam-o)" filter="url(#beam-shadow-o)"/>
  <line x1="6" y1="81" x2="194" y2="81" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
  <line x1="6" y1="91" x2="194" y2="91" stroke="rgba(0,0,0,0.20)" stroke-width="0.5"/>

  <!-- Fabric -->
  <rect x="6" y="93" width="188" height="100" fill="url(#fab-o)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fab-fold-o)"/>

  <!-- Bottom beam -->
  <rect x="6" y="193" width="188" height="16" rx="3" fill="url(#beam-o)" filter="url(#beam-shadow-o)"/>
  <line x1="6" y1="197" x2="194" y2="197" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
  <line x1="6" y1="207" x2="194" y2="207" stroke="rgba(0,0,0,0.20)" stroke-width="0.5"/>

  <!-- Glass / sky below bottom beam -->
  <rect x="6" y="209" width="188" height="45" fill="url(#sky-o)"/>

  <!-- Frame overlay border -->
  <rect x="6" y="6" width="188" height="248" rx="2" ry="2" fill="none" stroke="#2e6e8e" stroke-width="1" opacity="0.5"/>

  <!-- Label -->
  <rect x="20" y="236" width="160" height="18" rx="4" fill="rgba(0,0,0,0.30)"/>
  <text x="100" y="249" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0e0f8" font-weight="600" letter-spacing="0.5">🌊 Ocean</text>
</svg>

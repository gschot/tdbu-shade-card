<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(173,216,240,0.90)"/>
      <stop offset="100%" stop-color="rgba(230,248,255,0.70)"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="8%"   stop-color="#b8843a"/>
      <stop offset="35%"  stop-color="#a97840"/>
      <stop offset="65%"  stop-color="#8a6030"/>
      <stop offset="92%"  stop-color="#6b4820"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.18)"/>
    </linearGradient>
    <linearGradient id="fab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(220,178,98,0.95)"/>
      <stop offset="100%" stop-color="rgba(188,146,68,0.95)"/>
    </linearGradient>
    <pattern id="fold" width="1" height="15" patternUnits="userSpaceOnUse">
      <rect x="0" y="11" width="1" height="1" fill="rgba(80,50,10,0.18)"/>
      <rect x="0" y="14" width="1" height="1" fill="rgba(160,110,40,0.08)"/>
    </pattern>
    <linearGradient id="fab-sh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(0,0,0,0.30)"/>
      <stop offset="20%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="80%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.28)"/>
    </linearGradient>
    <filter id="bsf" x="-5%" y="-100%" width="110%" height="400%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.50)"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="200" height="260" rx="6" ry="6" fill="#6b5a3e"/>
  <rect x="6" y="6" width="188" height="73" fill="url(#sky)"/>
  <rect x="6" y="77" width="188" height="16" rx="4" fill="url(#beam)" filter="url(#bsf)"/>
  <rect x="6" y="79" width="188" height="1" fill="rgba(255,255,255,0.45)"/>
  <rect x="6" y="91" width="188" height="1" fill="rgba(0,0,0,0.25)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fab)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fold)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fab-sh)"/>
  <rect x="6" y="193" width="188" height="16" rx="4" fill="url(#beam)" filter="url(#bsf)"/>
  <rect x="6" y="195" width="188" height="1" fill="rgba(255,255,255,0.45)"/>
  <rect x="6" y="207" width="188" height="1" fill="rgba(0,0,0,0.25)"/>
  <rect x="6" y="209" width="188" height="45" fill="url(#sky)"/>
  <rect x="6" y="6" width="188" height="248" rx="2" ry="2" fill="none" stroke="#6b5a3e" stroke-width="1" opacity="0.4"/>
  <rect x="20" y="236" width="160" height="18" rx="4" fill="rgba(0,0,0,0.30)"/>
  <text x="100" y="249" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f0d898" font-weight="600" letter-spacing="0.5">&#x1FAB5; Natural Wood</text>
</svg>

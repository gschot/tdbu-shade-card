<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="sky-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(173,216,240,0.9)"/>
      <stop offset="100%" stop-color="rgba(230,248,255,0.7)"/>
    </linearGradient>
    <linearGradient id="beam-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7c5530"/>
      <stop offset="35%"  stop-color="#a97840"/>
      <stop offset="65%"  stop-color="#8a6030"/>
      <stop offset="100%" stop-color="#5d3d18"/>
    </linearGradient>
    <linearGradient id="fab-w" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(215,175,100,0.95)"/>
      <stop offset="100%" stop-color="rgba(190,148,72,0.95)"/>
    </linearGradient>
    <pattern id="fab-weave-w" width="10" height="8" patternUnits="userSpaceOnUse">
      <rect width="10" height="8" fill="transparent"/>
      <line x1="0" y1="8" x2="10" y2="8" stroke="rgba(100,65,15,0.13)" stroke-width="1"/>
      <line x1="9" y1="0" x2="9" y2="8" stroke="rgba(100,65,15,0.10)" stroke-width="1"/>
    </pattern>
    <filter id="beam-shadow-w">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>

  <!-- Frame -->
  <rect x="0" y="0" width="200" height="260" rx="6" ry="6" fill="#6b5a3e"/>

  <!-- Glass / sky above top beam -->
  <rect x="6" y="6" width="188" height="74" fill="url(#sky-w)"/>

  <!-- Top beam -->
  <rect x="6" y="77" width="188" height="16" rx="2" fill="url(#beam-w)" filter="url(#beam-shadow-w)"/>
  <!-- Beam wood grain lines -->
  <line x1="6" y1="82" x2="194" y2="82" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="6" y1="86" x2="194" y2="86" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>

  <!-- Fabric -->
  <rect x="6" y="93" width="188" height="100" fill="url(#fab-w)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fab-weave-w)"/>

  <!-- Bottom beam -->
  <rect x="6" y="193" width="188" height="16" rx="2" fill="url(#beam-w)" filter="url(#beam-shadow-w)"/>
  <line x1="6" y1="198" x2="194" y2="198" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="6" y1="202" x2="194" y2="202" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>

  <!-- Glass / sky below bottom beam -->
  <rect x="6" y="209" width="188" height="45" fill="url(#sky-w)"/>

  <!-- Frame overlay borders (inner) -->
  <rect x="6" y="6" width="188" height="248" rx="2" ry="2" fill="none" stroke="#6b5a3e" stroke-width="1" opacity="0.5"/>

  <!-- Label -->
  <rect x="20" y="236" width="160" height="18" rx="4" fill="rgba(0,0,0,0.30)"/>
  <text x="100" y="249" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f0d898" font-weight="600" letter-spacing="0.5">🪵 Natural Wood</text>
</svg>

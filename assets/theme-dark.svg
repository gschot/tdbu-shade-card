<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="sky-dk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(10,20,50,0.95)"/>
      <stop offset="100%" stop-color="rgba(20,35,70,0.85)"/>
    </linearGradient>
    <linearGradient id="beam-dk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a3a3a"/>
      <stop offset="35%"  stop-color="#555555"/>
      <stop offset="65%"  stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="fab-dk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(60,65,75,0.97)"/>
      <stop offset="100%" stop-color="rgba(40,45,55,0.97)"/>
    </linearGradient>
    <pattern id="fab-weave-dk" width="10" height="8" patternUnits="userSpaceOnUse">
      <rect width="10" height="8" fill="transparent"/>
      <line x1="0" y1="8" x2="10" y2="8" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <line x1="9" y1="0" x2="9" y2="8" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <!-- Stars in the sky -->
    <filter id="beam-shadow-dk">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.70)"/>
    </filter>
  </defs>

  <!-- Frame -->
  <rect x="0" y="0" width="200" height="260" rx="6" ry="6" fill="#2a2a2a"/>

  <!-- Glass / night sky above top beam -->
  <rect x="6" y="6" width="188" height="74" fill="url(#sky-dk)"/>
  <!-- Stars -->
  <circle cx="30" cy="20" r="1" fill="rgba(255,255,255,0.7)"/>
  <circle cx="70" cy="14" r="0.8" fill="rgba(255,255,255,0.5)"/>
  <circle cx="110" cy="30" r="1.1" fill="rgba(255,255,255,0.8)"/>
  <circle cx="155" cy="18" r="0.7" fill="rgba(255,255,255,0.6)"/>
  <circle cx="175" cy="35" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="50" cy="48" r="0.6" fill="rgba(255,255,255,0.4)"/>
  <circle cx="140" cy="55" r="0.8" fill="rgba(255,255,255,0.5)"/>

  <!-- Top beam -->
  <rect x="6" y="77" width="188" height="16" rx="2" fill="url(#beam-dk)" filter="url(#beam-shadow-dk)"/>
  <line x1="6" y1="82" x2="194" y2="82" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- Fabric -->
  <rect x="6" y="93" width="188" height="100" fill="url(#fab-dk)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fab-weave-dk)"/>

  <!-- Bottom beam -->
  <rect x="6" y="193" width="188" height="16" rx="2" fill="url(#beam-dk)" filter="url(#beam-shadow-dk)"/>
  <line x1="6" y1="198" x2="194" y2="198" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- Glass / night sky below bottom beam -->
  <rect x="6" y="209" width="188" height="45" fill="url(#sky-dk)"/>
  <circle cx="40" cy="225" r="0.7" fill="rgba(255,255,255,0.4)"/>
  <circle cx="120" cy="235" r="0.9" fill="rgba(255,255,255,0.5)"/>
  <circle cx="170" cy="220" r="0.6" fill="rgba(255,255,255,0.4)"/>

  <!-- Label -->
  <rect x="20" y="236" width="160" height="18" rx="4" fill="rgba(255,255,255,0.08)"/>
  <text x="100" y="249" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#aaa" font-weight="600" letter-spacing="0.5">🌑 Dark</text>
</svg>

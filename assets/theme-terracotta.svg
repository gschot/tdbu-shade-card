<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,220,180,0.85)"/>
      <stop offset="100%" stop-color="rgba(255,245,220,0.65)"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.32)"/>
      <stop offset="8%"   stop-color="#c8713a"/>
      <stop offset="40%"  stop-color="#b8603a"/>
      <stop offset="70%"  stop-color="#9a4828"/>
      <stop offset="92%"  stop-color="#7a3018"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.22)"/>
    </linearGradient>
    <linearGradient id="fab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(230,180,120,0.94)"/>
      <stop offset="100%" stop-color="rgba(205,155,90,0.94)"/>
    </linearGradient>
    <pattern id="fold" width="1" height="15" patternUnits="userSpaceOnUse">
      <rect x="0" y="11" width="1" height="1" fill="rgba(120,60,20,0.20)"/>
      <rect x="0" y="14" width="1" height="1" fill="rgba(180,100,40,0.09)"/>
    </pattern>
    <linearGradient id="fab-sh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(0,0,0,0.28)"/>
      <stop offset="20%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="80%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.28)"/>
    </linearGradient>
    <filter id="bsf" x="-5%" y="-100%" width="110%" height="400%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="200" height="260" rx="6" ry="6" fill="#a0522d"/>
  <rect x="6" y="6" width="188" height="73" fill="url(#sky)"/>
  <rect x="6" y="77" width="188" height="16" rx="4" fill="url(#beam)" filter="url(#bsf)"/>
  <rect x="6" y="79" width="188" height="1" fill="rgba(255,255,255,0.32)"/>
  <rect x="6" y="91" width="188" height="1" fill="rgba(0,0,0,0.22)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fab)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fold)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fab-sh)"/>
  <rect x="6" y="193" width="188" height="16" rx="4" fill="url(#beam)" filter="url(#bsf)"/>
  <rect x="6" y="195" width="188" height="1" fill="rgba(255,255,255,0.32)"/>
  <rect x="6" y="207" width="188" height="1" fill="rgba(0,0,0,0.22)"/>
  <rect x="6" y="209" width="188" height="45" fill="url(#sky)"/>
  <rect x="6" y="6" width="188" height="248" rx="2" ry="2" fill="none" stroke="#a0522d" stroke-width="1" opacity="0.4"/>
  <rect x="20" y="236" width="160" height="18" rx="4" fill="rgba(0,0,0,0.28)"/>
  <text x="100" y="249" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f5d0a0" font-weight="600" letter-spacing="0.5">&#x1FAB4; Terracotta</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <linearGradient id="sky-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,220,180,0.85)"/>
      <stop offset="100%" stop-color="rgba(255,245,220,0.65)"/>
    </linearGradient>
    <linearGradient id="beam-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.30)"/>
      <stop offset="8%"   stop-color="#c8713a"/>
      <stop offset="40%"  stop-color="#b8603a"/>
      <stop offset="70%"  stop-color="#9a4828"/>
      <stop offset="92%"  stop-color="#7a3018"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.22)"/>
    </linearGradient>
    <linearGradient id="fab-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(230,180,120,0.96)"/>
      <stop offset="100%" stop-color="rgba(205,155,90,0.96)"/>
    </linearGradient>
    <pattern id="fab-fold-t" width="1" height="12" patternUnits="userSpaceOnUse">
      <rect width="1" height="12" fill="transparent"/>
      <line x1="0" y1="11" x2="1" y2="11" stroke="rgba(120,60,20,0.20)" stroke-width="200"/>
    </pattern>
    <filter id="beam-shadow-t">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
  </defs>

  <!-- Frame -->
  <rect x="0" y="0" width="200" height="260" rx="6" ry="6" fill="#a0522d"/>

  <!-- Glass / sky above top beam -->
  <rect x="6" y="6" width="188" height="74" fill="url(#sky-t)"/>

  <!-- Top beam -->
  <rect x="6" y="77" width="188" height="16" rx="3" fill="url(#beam-t)" filter="url(#beam-shadow-t)"/>
  <line x1="6" y1="81" x2="194" y2="81" stroke="rgba(255,255,255,0.30)" stroke-width="1"/>
  <line x1="6" y1="91" x2="194" y2="91" stroke="rgba(0,0,0,0.20)" stroke-width="0.5"/>

  <!-- Fabric -->
  <rect x="6" y="93" width="188" height="100" fill="url(#fab-t)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fab-fold-t)"/>

  <!-- Bottom beam -->
  <rect x="6" y="193" width="188" height="16" rx="3" fill="url(#beam-t)" filter="url(#beam-shadow-t)"/>
  <line x1="6" y1="197" x2="194" y2="197" stroke="rgba(255,255,255,0.30)" stroke-width="1"/>
  <line x1="6" y1="207" x2="194" y2="207" stroke="rgba(0,0,0,0.20)" stroke-width="0.5"/>

  <!-- Glass / sky below bottom beam -->
  <rect x="6" y="209" width="188" height="45" fill="url(#sky-t)"/>

  <!-- Frame overlay border -->
  <rect x="6" y="6" width="188" height="248" rx="2" ry="2" fill="none" stroke="#a0522d" stroke-width="1" opacity="0.5"/>

  <!-- Label -->
  <rect x="20" y="236" width="160" height="18" rx="4" fill="rgba(0,0,0,0.28)"/>
  <text x="100" y="249" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f5d0a0" font-weight="600" letter-spacing="0.5">🏺 Terracotta</text>
</svg>

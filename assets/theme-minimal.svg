      <stop offset="80%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.14)"/>
    </linearGradient>
    <filter id="bsf" x="-5%" y="-100%" width="110%" height="400%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="200" height="260" rx="6" ry="6" fill="#e0e0e0"/>
  <rect x="6" y="6" width="188" height="73" fill="#f5f5f5"/>

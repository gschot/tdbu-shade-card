  <rect x="6" y="91" width="188" height="1" fill="rgba(0,0,0,0.10)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fab)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fold)"/>
  <rect x="6" y="93" width="188" height="100" fill="url(#fab-sh)"/>
  <rect x="6" y="193" width="188" height="16" rx="4" fill="url(#beam)" filter="url(#bsf)"/>
  <rect x="6" y="195" width="188" height="1" fill="rgba(255,255,255,0.60)"/>
  <rect x="6" y="207" width="188" height="1" fill="rgba(0,0,0,0.10)"/>
  <rect x="6" y="209" width="188" height="45" fill="#f5f5f5"/>
  <rect x="6" y="6" width="188" height="248" rx="2" ry="2" fill="none" stroke="#d0d0d0" stroke-width="1" opacity="0.6"/>
  <rect x="20" y="236" width="160" height="18" rx="4" fill="rgba(0,0,0,0.10)"/>
